<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — My Blog</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>
    .not-found {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .not-found-code {
      font-family: var(--font-display);
      font-size: 8rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--accent);
      opacity: 0.3;
      margin-bottom: 16px;
    }
    .not-found h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .not-found p {
      color: var(--muted);
      margin-bottom: 32px;
    }
    .not-found a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 8px;
      transition: opacity 0.2s;
    }
    .not-found a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <nav>
    <a href="./index.html" class="nav-logo"><span></span> My Blog</a>
    <div class="nav-links">
      <a href="./index.html#recent">Recent</a>
      <a href="./index.html#popular">Popular</a>
      <a href="./index.html#favorites">Favorites</a>
    </div>
  </nav>

  <div class="not-found">
    <div class="not-found-code" aria-hidden="true">404</div>
    <h1>Page not found</h1>
    <p>The post or page you're looking for doesn't exist or has been moved.</p>
    <a href="./index.html">← Back to home</a>
  </div>
</body>
</html>
