<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Base SEO — will be overridden dynamically by post.js -->
  <title>Post — My Blog</title>
  <meta name="description" content="A blog post.">
  <meta name="robots" content="index, follow">

  <!-- Open Graph base -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="My Blog">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/post.css">
</head>

<body>

  <!-- Reading Progress Bar -->
  <div id="post-progress" class="post-progress" role="progressbar" aria-label="Reading progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

  <!-- Navigation -->
  <nav aria-label="Main navigation">
    <a href="./index.html" class="nav-logo">
      <span></span> My Blog
    </a>
    <div class="nav-links">
      <a href="./index.html#recent">Recent</a>
      <a href="./index.html#popular">Popular</a>
      <a href="./index.html#favorites">Favorites</a>
    </div>
  </nav>

  <!-- Post Hero Image -->
  <div class="post-hero">
    <img id="post-hero-img" src="" alt="" loading="eager">
    <div class="post-hero-overlay" aria-hidden="true"></div>
    <div class="post-hero-content">
      <div class="post-tags" id="post-tags"></div>
      <h1 class="post-title" id="post-title">Loading…</h1>
      <div class="post-meta">
        <div class="post-author">
          <div class="author-avatar" aria-hidden="true">Y</div>
          <span class="author-name">Your Name</span>
        </div>
        <span class="post-meta-sep" aria-hidden="true">·</span>
        <time class="post-date" id="post-date"></time>
        <span class="post-meta-sep" aria-hidden="true">·</span>
        <span class="post-readtime" id="post-readtime"></span>
      </div>
    </div>
  </div>

  <!-- Post Body -->
  <main class="post-container">
    <article class="post-body" id="post-body" aria-live="polite">
      <p style="color:var(--muted)">Loading post content…</p>
    </article>

    <!-- Post Footer -->
    <div class="post-footer">
      <p class="post-footer-label">Continue reading</p>
      <div class="card-grid" id="related-grid"></div>

      <div style="margin-top: 48px;">
        <a href="./index.html" class="back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          Back to all posts
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>© <span id="year"></span> My Blog. Built with HTML, CSS & vanilla JS.</p>
    <p>Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a></p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="./assets/js/post.js"></script>
</body>
</html>
